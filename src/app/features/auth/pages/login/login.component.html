<div class="login-container">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-12 col-md-6 col-lg-5 col-xl-4">
        <div class="text-center mb-4 animate-fade-in-down">
          <h1 class="display-4 text-gradient mb-2">Torneo Galactico</h1>
          <p class="text-muted">El Gran Torneo Intergalactico</p>
        </div>

        <div class="galaxy-card animate-fade-in-up">
          <h2 class="h4 mb-4 text-center">Iniciar Sesion</h2>

          <form [formGroup]="form" (ngSubmit)="submit()">
            <div class="mb-3">
              <label for="username" class="form-label">Nombre de usuario</label>
              <input
                type="text"
                id="username"
                class="form-control"
                formControlName="username"
                placeholder="victor"
                autocomplete="username"
              />
            </div>

            <div class="mb-4">
              <label for="password" class="form-label">Contrasena</label>
              <input
                type="password"
                id="password"
                class="form-control"
                formControlName="password"
                placeholder="********"
                autocomplete="current-password"
              />
            </div>

            <button
              type="submit"
              class="btn btn-cosmic w-100"
              [disabled]="loading"
            >
              <span *ngIf="loading" class="loading-spinner me-2"></span>
              {{ loading ? 'Ingresando...' : 'Entrar' }}
            </button>
          </form>

          <div class="text-center mt-4">
            <p class="text-muted mb-0">
              No tienes cuenta?
              <a routerLink="/auth/register" class="ms-1">Registrate</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
