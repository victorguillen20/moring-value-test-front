<div class="register-container">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-12 col-md-6 col-lg-5 col-xl-4">
        <div class="text-center mb-4 animate-fade-in-down">
          <h1 class="display-4 text-gradient mb-2">Torneo Galactico</h1>
          <p class="text-muted">Crea tu cuenta de comandante</p>
        </div>

        <div class="galaxy-card animate-fade-in-up">
          <h2 class="h4 mb-4 text-center">Crear Cuenta</h2>

          <form [formGroup]="form" (ngSubmit)="submit()">
            <div class="mb-3">
              <label for="username" class="form-label">Nombre de usuario</label>
              <input
                type="text"
                id="username"
                class="form-control"
                formControlName="username"
                placeholder="victor"
                autocomplete="username"
              />
              <small class="text-muted">3-30 caracteres, solo letras, numeros y guion bajo</small>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input
                type="email"
                id="email"
                class="form-control"
                formControlName="email"
                placeholder="victor@galaxia.com"
                autocomplete="email"
              />
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Contrasena</label>
              <input
                type="password"
                id="password"
                class="form-control"
                formControlName="password"
                placeholder="********"
                autocomplete="new-password"
              />
              <small class="text-muted">Minimo 8 caracteres</small>
            </div>

            <div class="mb-4">
              <label for="confirmPassword" class="form-label">Confirmar contrasena</label>
              <input
                type="password"
                id="confirmPassword"
                class="form-control"
                formControlName="confirmPassword"
                placeholder="********"
                autocomplete="new-password"
              />
              <small *ngIf="form.hasError('passwordsMismatch') && form.get('confirmPassword')?.touched" class="text-danger">
                Las contrasenas no coinciden
              </small>
            </div>

            <button
              type="submit"
              class="btn btn-cosmic w-100"
              [disabled]="loading"
            >
              <span *ngIf="loading" class="loading-spinner me-2"></span>
              {{ loading ? 'Creando cuenta...' : 'Crear cuenta' }}
            </button>
          </form>

          <div class="text-center mt-4">
            <p class="text-muted mb-0">
              Ya tienes cuenta?
              <a routerLink="/auth/login" class="ms-1">Inicia sesion</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
